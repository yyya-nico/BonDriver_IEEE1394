; BonDriver_IEEE1394 設定ファイル

[Device]
; デバイス名のフィルタ（部分一致）
; 空の場合は最初に見つかったIEEE 1394デバイスを使用
DeviceNameFilter=

; デバイスインデックス（0から開始）
; -1の場合は最初に見つかったデバイスを使用
DeviceIndex=-1

[Buffer]
; TSストリームキューの最大サイズ
MaxQueueSize=256

; TSパケットサイズ（通常は188バイト）
PacketSize=188

[Transport]
; デバイスオープン時に自動再生するか
AutoPlay=false

; 再生開始時の待機時間（ミリ秒）
PlayStartDelay=1000

; コマンド実行後の待機時間（ミリ秒）
CommandDelay=100

[Debug]
; デバッグログを有効にする
EnableLog=false

; ログファイルパス
LogFilePath=BonDriver_IEEE1394.log
